version: '3.8'

services:
  wahuy:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wahuy
    restart: unless-stopped
    ports:
      - "7834:7834"
    environment:
      - NODE_ENV=production
      - PORT=7834
      - API_KEY=${API_KEY:-wahuy-default-api-key-change-me}
      - DASHBOARD_ENABLED=true
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin123}
      - LOG_LEVEL=info
      - STORAGE_PATH=/app/data
    volumes:
      - wahuy_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7834/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  wahuy_data:
    driver: local
